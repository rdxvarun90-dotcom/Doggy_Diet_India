<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Doggy Diet India</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #FDF8F3;
    }

    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .login-logo {
      font-size: 2.5rem;
      margin-bottom: .5rem;
    }

    .login-box h2 {
      margin-bottom: .3rem;
      color: #4A2C17;
      font-family: 'Playfair Display', serif;
    }

    .login-sub {
      font-size: .85rem;
      color: #999;
      margin-bottom: 1.5rem;
    }

    .input-group {
      position: relative;
      margin: .8rem 0;
      text-align: left;
    }

    .input-group label {
      font-size: .8rem;
      font-weight: 600;
      color: #4A2C17;
      display: block;
      margin-bottom: .3rem;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid #e0d5cc;
      font-size: .95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border .2s;
      box-sizing: border-box;
      outline: none;
    }

    .input-group input:focus {
      border-color: #F4823A;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: #F4823A;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 1rem;
      font-family: 'DM Sans', sans-serif;
      transition: background .2s, transform .1s;
    }

    .login-btn:hover  { background: #D96A22; }
    .login-btn:active { transform: scale(.98); }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error-msg {
      color: #e53935;
      font-size: .82rem;
      margin-top: .8rem;
      min-height: 1.2rem;
      font-weight: 500;
    }

    .success-msg {
      color: #2e7d32;
      font-size: .82rem;
      margin-top: .8rem;
      font-weight: 500;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin: 1.2rem 0;
      color: #ccc;
      font-size: .8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .register-link {
      font-size: .85rem;
      color: #777;
      margin-top: 1rem;
    }

    .register-link a {
      color: #F4823A;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .register-link a:hover { text-decoration: underline; }

    .register-form { display: none; }
    .register-form.active { display: block; }
    .login-form.hidden { display: none; }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-box">

    <div class="login-logo">🐾</div>
    <h2>Doggy Diet India</h2>
    <p class="login-sub">Premium nutrition for your best friend</p>

    <!-- ── LOGIN FORM ── -->
    <div class="login-form" id="loginForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail"
               placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword"
               placeholder="Enter password" />
      </div>

      <button class="login-btn" id="loginBtn" onclick="login()">
        Login →
      </button>

      <div class="error-msg"   id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>

      <div class="divider">or</div>

      <div class="register-link">
        New here?
        <a onclick="showRegister()">Create an account</a>
      </div>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div class="register-form" id="registerForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="regName"
               placeholder="Your name" />
      </div>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="regEmail"
               placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="regPassword"
               placeholder="Min 6 characters" />
      </div>

      <button class="login-btn" id="registerBtn"
              onclick="register()">
        Create Account →
      </button>

      <div class="error-msg"   id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>

      <div class="divider">or</div>

      <div class="register-link">
        Already have an account?
        <a onclick="showLogin()">Login here</a>
      </div>
    </div>

  </div>
</div>

<script>
  const BASE_URL = "http://doggydietindia-env.eba-zkgnz2tr.eu-north-1.elasticbeanstalk.com";

  // ── LOGIN ──────────────────────────────────────────
  async function login() {
    const email     = document.getElementById("loginEmail").value.trim();
    const password  = document.getElementById("loginPassword").value.trim();
    const errorEl   = document.getElementById("loginError");
    const successEl = document.getElementById("loginSuccess");
    const btn       = document.getElementById("loginBtn");

    errorEl.textContent   = "";
    successEl.textContent = "";

    if (!email || !password) {
      errorEl.textContent = "Please fill in all fields!";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Logging in...";

    try {
      const res = await fetch(`${BASE_URL}/api/auth/login`, {
        method:      "POST",
        headers:     { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      console.log("Login response:", data);

      if (res.ok) {
        // ✅ Token + user info save karo
        localStorage.setItem("token",    data.token);
        localStorage.setItem("username", data.username);
        localStorage.setItem("email",    data.email);
        localStorage.setItem("roles",    JSON.stringify(data.roles));

        successEl.textContent = "✅ Login successful! Redirecting...";

        // ✅ Role check karke redirect karo
        const roles = data.roles || [];
        setTimeout(() => {
          if (roles.includes("ROLE_ADMIN")) {
            window.location.href = "admin.html"; // 👑 Admin panel
          } else {
            window.location.href = "index.html"; // 🛍 Normal user
          }
        }, 1000);

      } else {
        errorEl.textContent = data || "Invalid email or password!";
      }

    } catch (err) {
      errorEl.textContent = "Server error! Please try again.";
      console.error(err);
    } finally {
      btn.disabled    = false;
      btn.textContent = "Login →";
    }
  }

  // ── REGISTER ───────────────────────────────────────
  async function register() {
    const username  = document.getElementById("regName").value.trim();
    const email     = document.getElementById("regEmail").value.trim();
    const password  = document.getElementById("regPassword").value.trim();
    const errorEl   = document.getElementById("registerError");
    const successEl = document.getElementById("registerSuccess");
    const btn       = document.getElementById("registerBtn");

    errorEl.textContent   = "";
    successEl.textContent = "";

    if (!username || !email || !password) {
      errorEl.textContent = "Please fill in all fields!";
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = "Password must be at least 6 characters!";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Creating account...";

    try {
      const res = await fetch(`${BASE_URL}/api/auth/register`, {
        method:      "POST",
        headers:     { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, email, password })
      });

      const text = await res.text();

      if (res.ok) {
        successEl.textContent = "✅ Account created! Please login.";
        setTimeout(() => showLogin(), 1500);
      } else {
        errorEl.textContent = text || "Registration failed!";
      }

    } catch (err) {
      errorEl.textContent = "Server error! Please try again.";
      console.error(err);
    } finally {
      btn.disabled    = false;
      btn.textContent = "Create Account →";
    }
  }

  // ── TOGGLE FORMS ───────────────────────────────────
  function showRegister() {
    document.getElementById("loginForm")
            .classList.add("hidden");
    document.getElementById("registerForm")
            .classList.add("active");
  }

  function showLogin() {
    document.getElementById("registerForm")
            .classList.remove("active");
    document.getElementById("loginForm")
            .classList.remove("hidden");
  }

  // ── ENTER KEY ──────────────────────────────────────
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const isRegister = document.getElementById("registerForm")
                          .classList.contains("active");
      isRegister ? register() : login();
    }
  });

  // ── Already logged in? ─────────────────────────────
  if (localStorage.getItem("username")) {
    const roles = JSON.parse(
      localStorage.getItem("roles") || "[]");
    if (roles.includes("ROLE_ADMIN")) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }
  }
</script>

</body>
</html>
